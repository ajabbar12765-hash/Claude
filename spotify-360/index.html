<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <meta name="description" content="Orbit 360 — a Spotify-style music player with true 360° spatial audio for any stereo headphones." />
  <title>Orbit 360 — Spatial Music</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app">

    <!-- ======= SIDEBAR ======= -->
    <nav class="sidebar" id="sidebar">
      <div class="brand">
        <svg viewBox="0 0 48 48" class="brand-logo" aria-hidden="true">
          <circle cx="24" cy="24" r="21" fill="none" stroke="url(#lg1)" stroke-width="3.5"/>
          <ellipse cx="24" cy="24" rx="21" ry="8.5" fill="none" stroke="url(#lg1)" stroke-width="2" opacity=".55"/>
          <circle cx="24" cy="24" r="6" fill="url(#lg1)"/>
          <circle cx="42" cy="17" r="3.4" fill="#1ed760"/>
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#1ed760"/><stop offset="1" stop-color="#7c5cff"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="brand-name">Orbit<em>360</em></span>
      </div>

      <div class="nav-group">
        <button class="nav-item active" data-view="home">
          <svg viewBox="0 0 24 24"><path d="M12 3.2 3 10.4V21h6.4v-6h5.2v6H21V10.4L12 3.2z"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-item" data-view="search">
          <svg viewBox="0 0 24 24"><path d="M10.5 3a7.5 7.5 0 1 0 4.66 13.4l4.22 4.22 1.42-1.42-4.22-4.22A7.5 7.5 0 0 0 10.5 3zm0 2a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11z"/></svg>
          <span>Search</span>
        </button>
        <button class="nav-item" data-view="library">
          <svg viewBox="0 0 24 24"><path d="M4 3h2v18H4V3zm5 0h2v18H9V3zm5.3.6 6.1 16.9-1.9.7L12.4 4.3l1.9-.7z"/></svg>
          <span>Your Library</span>
        </button>
      </div>

      <div class="nav-group nav-group--secondary">
        <div class="nav-label">Collection</div>
        <button class="nav-item" data-view="liked">
          <span class="nav-thumb nav-thumb--liked">
            <svg viewBox="0 0 24 24"><path d="M12 21S4 14.6 4 9.3C4 6.4 6.3 4 9.1 4c1.6 0 3 .8 2.9 2 0-1.2 1.3-2 2.9-2C17.7 4 20 6.4 20 9.3 20 14.6 12 21 12 21z"/></svg>
          </span>
          <span>Liked Songs</span>
        </button>
        <button class="nav-item" data-view="local">
          <span class="nav-thumb nav-thumb--local">
            <svg viewBox="0 0 24 24"><path d="M9 3v10.6A3.5 3.5 0 1 0 11 17V7h6v6.6A3.5 3.5 0 1 0 19 17V3H9z"/></svg>
          </span>
          <span>Local Files</span>
        </button>
      </div>

      <div class="sidebar-foot">
        <label class="upload-btn" for="file-input">
          <svg viewBox="0 0 24 24"><path d="M11 5.8 7.4 9.4 6 8l6-6 6 6-1.4 1.4L13 5.8V16h-2V5.8zM5 20v-2h14v2H5z"/></svg>
          Add your music
        </label>
        <input type="file" id="file-input" accept="audio/*" multiple hidden />
        <div class="device-chip" title="Spatial profile tuned for Sony WH-CH520">
          <svg viewBox="0 0 24 24"><path d="M12 4a8 8 0 0 0-8 8v6a2 2 0 0 0 2 2h2v-7H6v-1a6 6 0 1 1 12 0v1h-2v7h2a2 2 0 0 0 2-2v-6a8 8 0 0 0-8-8z"/></svg>
          <span>Sony WH-CH520</span>
          <i class="dot"></i>
        </div>
      </div>
    </nav>

    <!-- ======= MAIN ======= -->
    <main class="main" id="main">
      <header class="topbar">
        <div class="searchbox" id="searchbox">
          <svg viewBox="0 0 24 24"><path d="M10.5 3a7.5 7.5 0 1 0 4.66 13.4l4.22 4.22 1.42-1.42-4.22-4.22A7.5 7.5 0 0 0 10.5 3zm0 2a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11z"/></svg>
          <input id="search-input" type="search" placeholder="Search songs, artists, albums…" autocomplete="off" spellcheck="false" />
        </div>
        <button class="pill pill--360" id="open-studio" title="Open the 360° Studio">
          <span class="pulse-dot"></span> 360° Audio
        </button>
      </header>

      <section class="view" id="view-root"><!-- views render here --></section>
    </main>

    <!-- ======= 360 STUDIO PANEL ======= -->
    <aside class="studio" id="studio">
      <div class="studio-head">
        <h2>360° Studio</h2>
        <button class="icon-btn" id="close-studio" title="Close">
          <svg viewBox="0 0 24 24"><path d="m6.4 5 5.6 5.6L17.6 5 19 6.4 13.4 12l5.6 5.6-1.4 1.4-5.6-5.6L6.4 19 5 17.6 10.6 12 5 6.4 6.4 5z"/></svg>
        </button>
      </div>

      <canvas id="viz" class="viz" width="560" height="560" aria-label="Spatial audio visualization"></canvas>

      <div class="seg" id="mode-seg" role="tablist" aria-label="Audio mode">
        <button data-mode="stereo" role="tab">Stereo</button>
        <button data-mode="orbit" role="tab">Orbit</button>
        <button data-mode="reality" class="active" role="tab">360 Reality</button>
      </div>
      <p class="mode-hint" id="mode-hint">Instruments are placed on a sphere around your head — the Sony 360 Reality Audio experience, recreated with binaural HRTF.</p>

      <div class="sliders">
        <label class="slider-row">
          <span>Immersion</span>
          <input type="range" id="s-intensity" min="0.2" max="2" step="0.05" value="1" />
        </label>
        <label class="slider-row">
          <span>Motion</span>
          <input type="range" id="s-motion" min="0" max="1" step="0.01" value="0.35" />
        </label>
        <label class="slider-row">
          <span>Room</span>
          <input type="range" id="s-room" min="0" max="1" step="0.01" value="0.35" />
        </label>
      </div>

      <label class="toggle-row">
        <div>
          <strong>WH-CH520 profile</strong>
          <small>EQ tuned for Sony WH-CH520 drivers</small>
        </div>
        <input type="checkbox" id="hp-profile" checked />
        <span class="switch"></span>
      </label>
    </aside>

    <!-- ======= PLAYER BAR ======= -->
    <footer class="player" id="player">
      <div class="player-track">
        <div class="player-art" id="p-art">
          <svg viewBox="0 0 24 24" class="art-placeholder"><path d="M9 3v10.6A3.5 3.5 0 1 0 11 17V7h6v6.6A3.5 3.5 0 1 0 19 17V3H9z"/></svg>
        </div>
        <div class="player-meta">
          <div class="p-title" id="p-title">Nothing playing</div>
          <div class="p-artist" id="p-artist">Pick a song to start your 360° session</div>
        </div>
        <button class="icon-btn like-btn" id="p-like" title="Save to Liked Songs">
          <svg viewBox="0 0 24 24"><path d="M12 21S4 14.6 4 9.3C4 6.4 6.3 4 9.1 4c1.6 0 3 .8 2.9 2 0-1.2 1.3-2 2.9-2C17.7 4 20 6.4 20 9.3 20 14.6 12 21 12 21z"/></svg>
        </button>
      </div>

      <div class="player-center">
        <div class="transport">
          <button class="icon-btn" id="btn-shuffle" title="Shuffle">
            <svg viewBox="0 0 24 24"><path d="M17 4h4v4h-2V7.4l-4.3 4.3-1.4-1.4L17.6 6H17V4zM3 6h4.6l3.1 3.1-1.4 1.4L6.8 8H3V6zm14.6 10H17v-2h4v4h-2v-1.6l-4.3-4.3 1.4-1.4 3.5 3.5-.0-.0zM3 18v-2h3.8l2.5-2.5 1.4 1.4L7.6 18H3z"/></svg>
          </button>
          <button class="icon-btn" id="btn-prev" title="Previous">
            <svg viewBox="0 0 24 24"><path d="M6 5h2v14H6V5zm12 .8v12.4L9.5 12 18 5.8z"/></svg>
          </button>
          <button class="play-btn" id="btn-play" title="Play / Pause">
            <svg viewBox="0 0 24 24" class="ic-play"><path d="M8 5.1v13.8L19 12 8 5.1z"/></svg>
            <svg viewBox="0 0 24 24" class="ic-pause" hidden><path d="M7 5h3.4v14H7V5zm6.6 0H17v14h-3.4V5z"/></svg>
          </button>
          <button class="icon-btn" id="btn-next" title="Next">
            <svg viewBox="0 0 24 24"><path d="M16 5h2v14h-2V5zM6 5.8 14.5 12 6 18.2V5.8z"/></svg>
          </button>
          <button class="icon-btn" id="btn-repeat" title="Repeat">
            <svg viewBox="0 0 24 24"><path d="M7 7h10V4l4 3.5L17 11V8H8v3H6V8a1 1 0 0 1 1-1zm10 10H7v3l-4-3.5L7 10v3h9v-3h2v3a1 1 0 0 1-1 1v3z"/></svg>
          </button>
        </div>
        <div class="seek">
          <span class="time" id="t-cur">0:00</span>
          <div class="seekbar" id="seekbar"><div class="seek-fill" id="seek-fill"></div><div class="seek-knob" id="seek-knob"></div></div>
          <span class="time" id="t-dur">0:00</span>
        </div>
      </div>

      <div class="player-right">
        <button class="pill pill--mode" id="p-mode" title="Cycle audio mode">360 Reality</button>
        <svg viewBox="0 0 24 24" class="vol-ic"><path d="M4 9v6h4l5 4V5L8 9H4zm12.5 3a3.5 3.5 0 0 0-2-3.2v6.4a3.5 3.5 0 0 0 2-3.2zm-2-7.5v2.1a5.5 5.5 0 0 1 0 10.8v2.1a7.5 7.5 0 0 0 0-15z"/></svg>
        <input type="range" id="volume" class="volume" min="0" max="1" step="0.01" value="0.9" />
      </div>
    </footer>

    <!-- mobile nav -->
    <nav class="mobilenav" id="mobilenav">
      <button class="active" data-view="home"><svg viewBox="0 0 24 24"><path d="M12 3.2 3 10.4V21h6.4v-6h5.2v6H21V10.4L12 3.2z"/></svg>Home</button>
      <button data-view="search"><svg viewBox="0 0 24 24"><path d="M10.5 3a7.5 7.5 0 1 0 4.66 13.4l4.22 4.22 1.42-1.42-4.22-4.22A7.5 7.5 0 0 0 10.5 3zm0 2a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11z"/></svg>Search</button>
      <button data-view="library"><svg viewBox="0 0 24 24"><path d="M4 3h2v18H4V3zm5 0h2v18H9V3zm5.3.6 6.1 16.9-1.9.7L12.4 4.3l1.9-.7z"/></svg>Library</button>
      <button id="m-studio"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2.6"/></svg>360°</button>
    </nav>

    <div class="toast-wrap" id="toasts"></div>
  </div>

  <audio id="audio-main" preload="auto"></audio>
  <audio id="audio-bypass" preload="auto"></audio>

  <script type="module" src="js/app.js"></script>
</body>
</html>
