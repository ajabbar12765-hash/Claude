<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦕</text></svg>" />
    <!-- iPad / mobile friendly viewport: lock zoom so taps don't zoom, fit safe areas -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f7f7f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Dino Run" />
    <title>Dino Run — Offline Dinosaur Game</title>
    <link rel="stylesheet" href="./dino.css" />
  </head>
  <body>
    <main id="game-root">
      <div id="game-wrap">
        <canvas id="game"></canvas>
        <div id="hud">
          <p id="hint">Tap to jump &middot; swipe down or hold to duck</p>
        </div>
      </div>
    </main>
    <script src="./dino.js"></script>
  </body>
</html>
